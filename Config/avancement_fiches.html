<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avancement des Fiches UNESS</title>
<!-- Polices Google Premium -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,600&family=Outfit:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8fafc;
    --text: #0f172a;
    --text-muted: #475569;
    --border-color: rgba(148, 163, 184, 0.12);
    --border-color-strong: rgba(148, 163, 184, 0.25);
    --card-bg: rgba(255, 255, 255, 0.85);
    
    --purple: #6B63C4;
    --purple-light: rgba(107, 99, 196, 0.08);
    --teal: #1D9E75;
    --teal-light: rgba(29, 158, 117, 0.08);
    --coral: #E06A55;
    --coral-light: rgba(224, 106, 85, 0.08);
    --blue: #4A85B8;
    --blue-light: rgba(74, 133, 184, 0.08);
    --amber: #B07830;
    --amber-light: rgba(176, 120, 48, 0.08);
    --red: #E24B4A;
    --red-light: rgba(226, 75, 74, 0.08);
    
    --card-shadow: 0 4px 20px -2px rgba(148, 163, 184, 0.08), 0 2px 8px -1px rgba(148, 163, 184, 0.04);
    --card-shadow-hover: 0 12px 30px -4px rgba(107, 99, 196, 0.15), 0 4px 12px -2px rgba(107, 99, 196, 0.08);
    --font-sans: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-outfit: 'Outfit', sans-serif;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: var(--font-sans);
    color: var(--text);
    background-color: var(--bg);
    /* Subtle dot grid pattern background */
    background-image: radial-gradient(rgba(107, 99, 196, 0.035) 1.5px, transparent 1.5px);
    background-size: 24px 24px;
    min-height: 100vh;
    padding: 40px 20px 80px;
    -webkit-font-smoothing: antialiased;
  }
  
  .page {
    max-width: 1040px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* ── SITE HEADER (GLASSMORPHIC BANNER) ── */
  .site-header {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 20px;
    padding: 24px 32px;
    box-shadow: var(--card-shadow);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 20px;
    position: relative;
    overflow: hidden;
  }
  
  .site-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--purple), var(--blue), var(--teal));
  }
  
  .site-header-left {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  
  .header-tag {
    display: inline-flex;
    align-items: center;
    font-family: var(--font-outfit);
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #fff;
    background: linear-gradient(135deg, var(--purple), var(--blue));
    border-radius: 99px;
    padding: 4px 14px;
    width: fit-content;
    box-shadow: 0 4px 10px rgba(107, 99, 196, 0.2);
  }
  
  .site-title {
    font-family: var(--font-outfit);
    font-size: 2.1rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.15;
    color: var(--text);
  }
  
  .site-title span {
    background: linear-gradient(110deg, var(--purple) 0%, var(--blue) 55%, var(--teal) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ── KPI STATS GRID ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    width: 100%;
  }
  
  .kpi-card {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 18px;
    padding: 20px;
    box-shadow: var(--card-shadow);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    gap: 20px;
    position: relative;
    overflow: hidden;
  }
  
  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 4px; height: 100%;
  }
  
  .kpi-card.total-card::before { background: var(--blue); }
  .kpi-card.done-card::before { background: var(--teal); }
  .kpi-card.todo-card::before { background: var(--coral); }
  .kpi-card.pct-card::before { background: var(--purple); }
  
  .kpi-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 25px -5px rgba(148, 163, 184, 0.18), 0 8px 10px -6px rgba(148, 163, 184, 0.12);
  }
  
  .kpi-icon {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    flex-shrink: 0;
  }
  
  .total-card .kpi-icon { background: var(--blue-light); color: var(--blue); }
  .done-card .kpi-icon { background: var(--teal-light); color: var(--teal); }
  .todo-card .kpi-icon { background: var(--coral-light); color: var(--coral); }
  .pct-card .kpi-icon { background: var(--purple-light); color: var(--purple); }
  
  /* Required structure for update_avancement.py regex */
  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }
  
  .stat-value {
    font-family: var(--font-outfit);
    font-size: 1.85rem;
    font-weight: 800;
    line-height: 1;
    color: var(--text);
  }
  
  .stat-label {
    font-size: 0.74rem;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* ── PROGRESS BAR COMPONENT ── */
  .progress-section {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 18px;
    padding: 24px;
    box-shadow: var(--card-shadow);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  
  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 8px;
  }
  
  .progress-title {
    font-family: var(--font-outfit);
    font-size: 1.05rem;
    font-weight: 800;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .progress-details {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--purple);
    background: var(--purple-light);
    padding: 4px 14px;
    border-radius: 99px;
    border: 1px solid rgba(107, 99, 196, 0.15);
  }
  
  .progress-bar-wrap {
    height: 10px;
    background: #e2e8f0;
    border-radius: 99px;
    overflow: hidden;
    position: relative;
  }
  
  .progress-bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--purple), var(--blue), var(--teal));
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 2px 8px rgba(107, 99, 196, 0.3);
  }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 22px;
    border-radius: 99px;
    border: 1.5px solid transparent;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    text-decoration: none;
  }
  
  .btn-primary {
    background: var(--purple);
    color: #fff;
    box-shadow: 0 4px 14px rgba(107, 99, 196, 0.25);
  }
  
  .btn-primary:hover {
    box-shadow: 0 6px 20px rgba(107, 99, 196, 0.38);
    transform: translateY(-2px);
  }
  
  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    border-color: var(--border-color-strong);
  }
  
  .btn-ghost:hover {
    border-color: var(--purple);
    color: var(--purple);
    background: var(--purple-light);
    transform: translateY(-1px);
  }

  /* ── VIEW SWITCH TRANSITIONS ── */
  #view-home, #view-list {
    transition: opacity 0.25s cubic-bezier(0.4, 0, 0.2, 1), transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ══════════════════════════════════════
     VUE HOMEPAGE
  ══════════════════════════════════════ */
  #view-home { display: block; }
  
  .home-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 16px;
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 14px 24px;
    box-shadow: var(--card-shadow);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  
  .home-actions-title {
    font-size: 0.88rem;
    color: var(--text-muted);
    font-weight: 600;
  }

  /* Grid of Module Cards */
  .modules-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    margin-bottom: 28px;
  }
  @media (max-width: 768px) {
    .modules-grid {
      grid-template-columns: 1fr;
    }
  }
  
  .spec-group {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: var(--card-shadow);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
  }
  
  .spec-group:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 30px -4px rgba(148, 163, 184, 0.22);
  }
  
  .spec-group-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border-color);
    background: rgba(248, 250, 252, 0.6);
  }
  
  .spec-group-left {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }
  
  .spec-group-name {
    font-family: var(--font-outfit);
    font-size: 1.05rem;
    font-weight: 800;
  }
  
  .spec-group-sub {
    font-size: 0.78rem;
    color: var(--text-muted);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  
  .spec-group-stats {
    font-family: var(--font-outfit);
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--text);
    background: #e2e8f0;
    padding: 3px 9px;
    border-radius: 8px;
    white-space: nowrap;
  }

  /* Dynamic specialties row */
  .spec-item {
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    cursor: pointer;
    border-bottom: 1px solid var(--border-color);
    transition: background 0.2s;
  }
  
  .spec-item:last-child { border-bottom: none; }
  
  .spec-item:hover { background: rgba(107, 99, 196, 0.03); }
  
  .spec-item-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0; opacity: 0.06;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
  
  .spec-item-name {
    flex: 1;
    font-size: 0.88rem;
    font-weight: 600;
    z-index: 1;
    position: relative;
  }
  
  .spec-item-count {
    font-family: var(--font-outfit);
    font-size: 0.76rem;
    font-weight: 800;
    padding: 3px 10px;
    border-radius: 99px;
    z-index: 1;
    position: relative;
    white-space: nowrap;
  }
  
  .spec-item-arrow {
    z-index: 1;
    position: relative;
    opacity: 0.35;
    flex-shrink: 0;
    transition: transform 0.2s ease, opacity 0.2s ease;
  }
  
  .spec-item:hover .spec-item-arrow {
    transform: translateX(3px);
    opacity: 0.8;
  }

  /* Section "Autres matières" */
  .autres-section {
    margin-bottom: 8px;
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 18px;
    padding: 24px;
    box-shadow: var(--card-shadow);
  }
  
  .autres-title {
    font-family: var(--font-outfit);
    font-size: 0.95rem;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 16px;
  }
  
  #autres-pills {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 12px;
  }

  /* Recherche matières */
  .college-search-wrap {
    position: relative;
    margin-bottom: 24px;
  }
  .college-search-icon {
    position: absolute;
    left: 16px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }
  #college-search {
    width: 100%;
    padding: 13px 16px 13px 44px;
    border: 1px solid var(--border-color);
    border-radius: 14px;
    background: var(--card-bg);
    color: var(--text);
    font-size: 0.92rem;
    font-family: inherit;
    box-shadow: var(--card-shadow);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #college-search:focus {
    outline: none;
    border-color: #6B63C4;
    box-shadow: 0 0 0 3px rgba(107, 99, 196, 0.12);
  }

  /* Grille de matières (collèges) */
  .colleges-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }

  .college-card {
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 18px;
    cursor: pointer;
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 14px;
    box-shadow: var(--card-shadow);
    transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s;
  }
  .college-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 26px -6px rgba(148, 163, 184, 0.28);
  }
  .college-card-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    opacity: 0.08;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .college-card-name {
    flex: 1;
    font-size: 0.95rem;
    font-weight: 700;
    z-index: 1;
    position: relative;
  }
  .college-card-count {
    font-family: var(--font-outfit);
    font-size: 0.78rem;
    font-weight: 800;
    padding: 4px 11px;
    border-radius: 99px;
    z-index: 1;
    position: relative;
    white-space: nowrap;
  }
  .college-card-arrow {
    z-index: 1; position: relative;
    opacity: 0.35; flex-shrink: 0;
    transition: transform 0.2s ease, opacity 0.2s ease;
  }
  .college-card:hover .college-card-arrow { transform: translateX(3px); opacity: 0.8; }
  .colleges-empty {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--text-muted);
    padding: 30px;
    font-weight: 600;
  }

  /* ══════════════════════════════════════
     VUE LISTE
  ══════════════════════════════════════ */
  #view-list { display: none; opacity: 0; transform: translateY(10px); }
  
  .list-nav {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  
  .list-title {
    font-family: var(--font-outfit);
    font-size: 1.45rem;
    font-weight: 800;
    color: var(--text);
    flex: 1;
  }
  
  .list-title .list-spec-badge {
    display: inline-block;
    font-family: var(--font-sans);
    font-size: 0.82rem;
    font-weight: 700;
    padding: 4px 16px;
    border-radius: 99px;
    color: #fff;
    margin-left: 8px;
    vertical-align: middle;
    box-shadow: 0 4px 10px rgba(107, 99, 196, 0.18);
  }
  
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 16px;
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 18px;
    padding: 12px;
    box-shadow: var(--card-shadow);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  
  .filter-btn {
    padding: 8px 18px;
    border-radius: 99px;
    border: 1.5px solid var(--border-color-strong);
    background: transparent;
    color: var(--text-muted);
    font-size: 0.82rem;
    cursor: pointer;
    font-weight: 700;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  
  .filter-btn:hover {
    border-color: var(--purple);
    color: var(--purple);
    background: var(--purple-light);
  }
  
  .filter-btn.active {
    background: var(--purple);
    color: #fff;
    border-color: var(--purple);
    box-shadow: 0 4px 12px rgba(107, 99, 196, 0.28);
  }
  
  .search-wrap {
    flex: 1;
    min-width: 240px;
    position: relative;
  }
  
  .search-wrap svg {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    stroke: var(--text-muted);
    fill: none;
    stroke-width: 2.2;
    stroke-linecap: round;
    stroke-linejoin: round;
    pointer-events: none;
  }
  
  .search-wrap input {
    width: 100%;
    padding: 9px 15px 9px 42px;
    border-radius: 99px;
    border: 1.5px solid var(--border-color-strong);
    background: #f8fafc;
    color: var(--text);
    font-size: 0.86rem;
    font-weight: 500;
    outline: none;
    transition: all 0.2s ease;
  }
  
  .search-wrap input:focus {
    border-color: var(--purple);
    background: #fff;
    box-shadow: 0 0 0 4px rgba(107, 99, 196, 0.1);
  }
  
  .search-wrap input::placeholder { color: var(--text-muted); }
  
  .count-info {
    font-size: 0.84rem;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 12px;
    padding-left: 4px;
  }
  
  .items-grid {
    display: grid;
    gap: 6px;
  }
  
  .item-card {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 10px;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: inherit;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: var(--card-shadow);
    cursor: pointer;
  }
  
  .item-card[href]:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px -2px rgba(148, 163, 184, 0.15);
    border-color: rgba(107, 99, 196, 0.3);
  }
  
  .item-card.done-card {
    border-left: 3px solid var(--teal);
  }
  
  .item-card.done-card:hover {
    border-color: var(--teal);
    box-shadow: 0 4px 12px -2px rgba(29, 158, 117, 0.15);
  }
  
  .item-num {
    font-family: var(--font-outfit);
    font-size: 0.72rem;
    font-weight: 800;
    color: #fff;
    min-width: 28px;
    height: 28px;
    background: var(--purple);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 1px 4px rgba(107, 99, 196, 0.2);
  }
  
  .item-card.done-card .item-num {
    background: var(--teal);
    box-shadow: 0 1px 4px rgba(29, 158, 117, 0.2);
  }
  
  .item-name {
    flex: 1;
    font-size: 0.85rem;
    font-weight: 600;
    line-height: 1.35;
    color: var(--text);
  }
  
  .spec-tags {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 4px;
    flex-shrink: 0;
    max-width: 260px;
  }
  
  .spec-tag {
    font-size: 0.65rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 99px;
    background: var(--purple-light);
    color: var(--purple);
    border: 1px solid rgba(107, 99, 196, 0.15);
    white-space: nowrap;
  }
  
  .badge {
    flex-shrink: 0;
    padding: 3px 10px;
    border-radius: 99px;
    font-size: 0.65rem;
    font-weight: 800;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  
  .badge.done {
    background: var(--teal-light);
    color: var(--teal);

/* Palette de couleurs cyclique pour les cartes de matière */
const COLLEGE_PALETTE = ['#6B63C4','#7C59CC','#C06050','#B07830','#A84060','#2A9080','#4A85B8','#3A9060','#5A7CC0','#B0506A','#8458B8','#3E8F8A'];
function collegeColor(i){ return COLLEGE_PALETTE[i % COLLEGE_PALETTE.length]; }

/* Accès rapide item par numéro */
const byNum = Object.fromEntries(DATA.map(x => [x.num, x]));

/* Numéros d'items appartenant à une matière (gère le pseudo-collège "Non classé") */
function collegeNums(name) {
  if (COLLEGES[name]) return COLLEGES[name];
  const classified = new Set(Object.values(COLLEGES).flat());
  return DATA.filter(x => !classified.has(x.num)).map(x => x.num);
}

/* ── Rendu de la homepage ── */
const ARROW_SVG = `<svg class="college-card-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;

function renderHome() {
  const grid = document.getElementById('colleges-grid');
  const names = Object.keys(COLLEGES).sort((a,b) => a.localeCompare(b,'fr'));
  const entries = names.map((n,i) => ({ name:n, nums:COLLEGES[n], color:collegeColor(i) }));

  // Items présents dans DATA mais rattachés à aucun collège
  const nonClasses = collegeNums('Non classé');
  if (nonClasses.length) entries.push({ name:'Non classé', nums:nonClasses, color:'#94A3B8' });

  grid.innerHTML = entries.map(e => {
    const total = e.nums.length;
    const done = e.nums.filter(num => byNum[num] && byNum[num].fiche).length;
    const pct = total ? Math.round(done / total * 100) : 0;
    return `<div class="college-card" data-name="${e.name.toLowerCase()}" data-college="${e.name.replace(/"/g,'&quot;')}" data-color="${e.color}">
      <div class="college-card-bar" style="width:${pct}%;background:${e.color};"></div>
      <span class="college-card-name">${e.name}</span>
      <span class="college-card-count" style="background:${e.color}1a;color:${e.color};">${done}/${total}</span>
      ${ARROW_SVG}
    </div>`;
  }).join('');

  // Délégation de clic (robuste aux apostrophes dans les noms)
  grid.onclick = (ev) => {
    const card = ev.target.closest('.college-card');
    if (card) showList(card.dataset.college, card.dataset.color);
  };
}

/* ── Filtrage des matières par la barre de recherche ── */
function filterColleges() {
  const q = document.getElementById('college-search').value.toLowerCase().trim();
  const grid = document.getElementById('colleges-grid');
  let visible = 0;
  grid.querySelectorAll('.college-card').forEach(card => {
    const match = !q || card.dataset.name.includes(q);
    card.style.display = match ? '' : 'none';
    if (match) visible++;
  });
  let empty = document.getElementById('colleges-empty');
  if (!visible) {
    if (!empty) {
      empty = document.createElement('div');
      empty.id = 'colleges-empty';
      empty.className = 'colleges-empty';
      empty.textContent = 'Aucune matière trouvée.';
      grid.appendChild(empty);
    }
    empty.style.display = '';
  } else if (empty) {
    empty.style.display = 'none';
  }
}

/* ── Navigation avec transitions fluides ── */
function showHome() {
  const vHome = document.getElementById('view-home');
  const vList = document.getElementById('view-list');
  
  vList.style.opacity = '0';
  vList.style.transform = 'translateY(8px)';
  setTimeout(() => {
    vList.style.display = 'none';
    vHome.style.display = 'block';
    // Force reflow
    vHome.offsetHeight;
    vHome.style.opacity = '1';
    vHome.style.transform = 'translateY(0)';
  }, 200);
}

function showList(spec, color) {
  const vHome = document.getElementById('view-home');
  const vList = document.getElementById('view-list');
  
  currentSpec = spec;
  currentFilter = 'all';
  
  // Reset active button state
  document.querySelectorAll('.filter-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  document.getElementById('search').value = '';
  
  const title = document.getElementById('list-title');
  if (spec) {
    const col = color || '#6B63C4';
    title.innerHTML = `Items &middot; <span class="list-spec-badge" style="background:${col}">${spec}</span>`;
  } else {
    title.textContent = 'Tous les items';
  }
  
  applyFilters();
  
  vHome.style.opacity = '0';
  vHome.style.transform = 'translateY(8px)';
  setTimeout(() => {
    vHome.style.display = 'none';
    vList.style.display = 'block';
    // Force reflow
    vList.offsetHeight;
    vList.style.opacity = '1';
    vList.style.transform = 'translateY(0)';
  }, 200);
}

/* ── Filtres liste ── */
let currentFilter = 'all';
let currentSpec = null;

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let items = DATA;
  if (currentSpec) {
    const set = new Set(collegeNums(currentSpec));
    items = items.filter(x => set.has(x.num));
  }
  if (currentFilter === 'done') items = items.filter(x => x.fiche);
  if (currentFilter === 'todo') items = items.filter(x => !x.fiche);
  if (q) items = items.filter(x => x.name.toLowerCase().includes(q) || String(x.num).includes(q));

  const grid = document.getElementById('grid');
  const info = document.getElementById('count-info');

  if (items.length === 0) {
    grid.innerHTML = '<div class="no-results">Aucun item trouvé.</div>';
    info.textContent = '';
    return;
  }
  info.textContent = items.length + ' item' + (items.length > 1 ? 's' : '') + ' affiché' + (items.length > 1 ? 's' : '');

  grid.innerHTML = items.map(item => {
    const url = item.fiche ? item.fiche_url : item.lisa_url;
    const cardClass = item.fiche ? 'done-card' : '';
    const badge = item.fiche
      ? '<span class="badge done">Fait</span>'
      : '<span class="badge todo">À faire</span>';
    const specs = item.specs || [];
    const tagsHtml = specs.length
      ? '<span class="spec-tags">' + specs.map(s => `<span class="spec-tag">${s}</span>`).join('') + '</span>'
      : '';
    return `<a class="item-card ${cardClass}" href="${url}" target="_blank">
      <span class="item-num">${item.num}</span>
      <span class="item-name">${item.name}</span>
      ${tagsHtml}
      ${badge}
    </a>`;
  }).join('');
}

renderHome();
